x-api-environment: &api-environment
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  APP_NAME: ${APP_NAME:-FastAPI PostgreSQL CRUD}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-false}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

services:
  database:
    image: postgres:16
    container_name: postgres-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    volumes:
      - fastapi_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: app-redis
    ports:
      - "${REDIS_PUBLISH_PORT}:6379"
    volumes:
      - fastapi_redisdata:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
  api:
    build: .
    container_name: backend-api
    ports:
      - "${API_PUBLISH_PORT}:8000"
    environment:
      <<: *api-environment
    depends_on:
      - database
      - redis

  # Run migrations manually: docker compose --profile migrate run --rm migrate
  # Not started by plain `docker compose up` (uses profile `migrate`).
  migrate:
    profiles: ["migrate"]
    build: .
    container_name: backend-migrate
    environment:
      <<: *api-environment
    # python -m alembic works even when the alembic console script is missing from PATH
    command: python -m alembic upgrade head
    depends_on:
      - database

volumes:
  fastapi_pgdata:
  fastapi_redisdata:
