x-api-environment: &api-environment
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
  APP_NAME: ${APP_NAME:-FastAPI PostgreSQL CRUD}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-false}
  API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  FRONTEND_OAUTH_SUCCESS_URL: ${FRONTEND_OAUTH_SUCCESS_URL}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
  RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-40}
  RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-200}
  OPENAPI_DOCS_IN_PRODUCTION: ${OPENAPI_DOCS_IN_PRODUCTION:-false}

services:
  database:
    image: postgres:16
    container_name: backend-postgres-database_1
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    volumes:
      - fastapi_postgresql_pgdata_1:/var/lib/postgresql/data
  api:
    build: .
    container_name: backend-fastapi-postgresql-api_1
    ports:
      - "${API_PUBLISH_PORT}:8000"
    environment:
      <<: *api-environment
    depends_on:
      - database

volumes:
  fastapi_postgresql_pgdata_1:
